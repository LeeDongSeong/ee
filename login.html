<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 | Vibe Store</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
<main class="login-page">
    <section class="login-panel panel" aria-label="로그인 페이지">
        <div class="login-page-header">
            <h1>Vibe Store</h1>
            <p class="muted">로그인 또는 회원가입 후 서비스를 이용하세요.</p>
        </div>

        <div class="auth-tabs">
            <button id="showLoginBtn" class="tab-btn active" type="button">로그인</button>
            <button id="showSignupBtn" class="tab-btn" type="button">회원가입</button>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-row">
                <label for="loginId">아이디</label>
                <input id="loginId" type="text" maxlength="30" required />
            </div>

            <div class="form-row">
                <label for="loginPw">비밀번호</label>
                <input id="loginPw" type="password" maxlength="30" required />
            </div>

            <button type="submit" class="primary-btn full-btn">로그인</button>
        </form>

        <form id="signupForm" class="auth-form hidden">
            <div class="form-row">
                <label for="signupId">아이디</label>
                <input id="signupId" type="text" maxlength="30" required />
            </div>

            <div class="form-row">
                <label for="signupPw">비밀번호</label>
                <input id="signupPw" type="password" maxlength="30" required />
            </div>

            <div class="form-row">
                <label for="signupNickname">닉네임</label>
                <input id="signupNickname" type="text" maxlength="30" required />
            </div>

            <button type="submit" class="primary-btn full-btn">회원가입</button>
        </form>

        <div class="login-page-actions">
            <button id="goHomeBtn" class="secondary-btn full-btn" type="button">
                스토어 홈으로 돌아가기
            </button>
        </div>
    </section>
</main>

<script src="./login.js"></script>
</body>
</html>
